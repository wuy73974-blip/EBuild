name: Upload IPA to App Store

on:
  repository_dispatch:
    types: [ebbuild_upload_ipa]

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Upload IPA
        run: |
          # 1. 直接从 Payload 提取变量
          IPA_URL="${{ github.event.client_payload.ipa_url }}"
          RAW_P8="${{ github.event.client_payload.apple_p8_base64 }}"
          KEY_ID="${{ github.event.client_payload.apple_key_id }}"
          ISSUER="${{ github.event.client_payload.apple_issuer_id }}"

          # 2. 安全屏蔽：防止这些变量出现在日志中
          echo "::add-mask::$RAW_P8"
          echo "::add-mask::$KEY_ID"
          echo "::add-mask::$ISSUER"

          # 3. 创建私钥目录和文件 (文件名必须匹配 Key ID)
          mkdir -p ~/.private_keys
          echo "$RAW_P8" | base64 -d > ~/.private_keys/AuthKey_$KEY_ID.p8
          
          # 4. 下载 IPA 文件
          echo "正在从服务器下载 IPA..."
          curl -L "$IPA_URL" -o build.ipa

          # 5. 执行验证 (推荐先验证再上传，避免浪费额度)
          echo "正在校验 IPA 配置..."
          xcrun altool --validate-app \
            -f build.ipa \
            -t ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER"

          # 6. 正式上传
          echo "校验通过，正在上传至 App Store..."
          xcrun altool --upload-app \
            -f build.ipa \
            -t ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER"
