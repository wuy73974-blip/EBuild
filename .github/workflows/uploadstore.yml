- name: Download and Upload IPA
        run: |
          # 1. 提取变量 (确保变量名和 Koa 的 apple_p8_content 一致)
          IPA_URL="${{ github.event.client_payload.ipa_url }}"
          RAW_P8="${{ github.event.client_payload.apple_p8_content }}"
          KEY_ID="${{ github.event.client_payload.apple_key_id }}"
          ISSUER="${{ github.event.client_payload.apple_issuer_id }}"

          # 2. 核心：定义绝对路径 (避免 ~ 在脚本中失效)
          P8_DIR="$HOME/.private_keys"
          P8_PATH="$P8_DIR/AuthKey_$KEY_ID.p8"

          # 3. 变量有效性预检
          if [ -z "$RAW_P8" ]; then
            echo "错误: 未接收到 apple_p8_content 数据，请检查 Koa 参数名！"
            exit 1
          fi

          # 4. 创建目录并解码还原 (使用 printf 避免 echo 带来的换行污染)
          mkdir -p "$P8_DIR"
          printf "%s" "$RAW_P8" | base64 -d > "$P8_PATH"

          # 5. 再次验证文件是否存在且不为空
          if [ ! -s "$P8_PATH" ]; then
            echo "错误: 密钥文件创建失败或为空！"
            exit 1
          fi
          
          echo "密钥文件已就绪: $P8_PATH"

          # 6. 下载 IPA
          curl -fL "$IPA_URL" -o build.ipa || { echo "下载 IPA 失败"; exit 1; }

          # 7. 执行上传 (altool 会自动去 ~/.private_keys 找文件)
          xcrun altool --upload-app \
            -f build.ipa \
            -t ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER"
