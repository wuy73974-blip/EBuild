name: EBbuild Upload IPA to App Store

on:
  repository_dispatch:
    types: [ebbuild_ipa_upload_task] 

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Process IPA and Callback
        run: |
          # 1. 提取变量
          IPA_URL="${{ github.event.client_payload.ipa_url }}"
          RAW_P8="${{ github.event.client_payload.apple_p8_content }}"
          KEY_ID="${{ github.event.client_payload.apple_key_id }}"
          ISSUER="${{ github.event.client_payload.apple_issuer_id }}"
          TASK_ID="${{ github.event.client_payload.taskId }}"

          # 2. 回调配置
          CALLBACK_URL="http://api.whzmsl.top/api/ios/uploadipa/callback"
          
          send_callback() {
            local status=$1
            # 使用 jq 或简单的字符串处理来清理 message 中的双引号，防止 JSON 解析失败
            local message=$(echo "$2" | tr -d '"' | tr -d '\n' | tail -c 1000)
            echo "::notice ::发送回调 [$status]: $message"
            curl -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"taskId\": \"$TASK_ID\", \"status\": \"$status\", \"message\": \"$message\"}" \
              --silent --output /dev/null || echo "警告: 回调接口访问失败"
          }

          # 3. 准备阶段
          P8_DIR="$HOME/.private_keys"
          P8_PATH="$P8_DIR/AuthKey_$KEY_ID.p8"
          
          send_callback "running" "正在解析证书密钥..."
          
          if [ -z "$RAW_P8" ]; then
            send_callback "error" "证书解析失败：Payload 密钥数据为空"
            exit 1
          fi

          mkdir -p "$P8_DIR"
          printf "%s" "$RAW_P8" | base64 -d > "$P8_PATH"

          if [ ! -s "$P8_PATH" ]; then
            send_callback "error" "密钥文件生成失败，Base64 解码异常"
            exit 1
          fi

          # 4. 下载阶段
          send_callback "running" "正在从远程服务器下载 IPA..."
          curl -fL "$IPA_URL" -o build.ipa || { send_callback "error" "IPA 下载失败，请检查 URL 是否有效"; exit 1; }

          # 5. 校验阶段 (捕获详细报错)
          send_callback "running" "正在进行苹果商店合规性校验..."
          
          # 将报错信息记录到 validate_err.log
          xcrun altool --validate-app \
            -f build.ipa \
            -t ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER" > validate_info.log 2> validate_err.log || {
              # 如果失败，读取错误日志的前几行发送给前端
              ERR_DETAIL=$(cat validate_err.log | grep "ERROR" | head -n 3)
              if [ -z "$ERR_DETAIL" ]; then ERR_DETAIL=$(cat validate_info.log | grep "ERROR" | head -n 3); fi
              send_callback "error" "校验失败: $ERR_DETAIL"
              exit 1
            }

          # 6. 上传阶段 (捕获详细报错)
          send_callback "running" "校验通过，正在正式上传至 App Store..."
          xcrun altool --upload-app \
            -f build.ipa \
            -t ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER" > upload_info.log 2> upload_err.log || {
              ERR_DETAIL=$(cat upload_err.log | grep "ERROR" | head -n 3)
              if [ -z "$ERR_DETAIL" ]; then ERR_DETAIL=$(cat upload_info.log | grep "ERROR" | head -n 3); fi
              send_callback "error" "上传失败: $ERR_DETAIL"
              exit 1
            }

          # 7. 完成
          send_callback "success" "恭喜 wuyong！App 已成功上传至 App Store Connect"

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/.private_keys
          echo "临时密钥已清理"
